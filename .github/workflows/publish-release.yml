name: Publish Release

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  publish-release:
    permissions:
      contents: read
      id-token: write
    # The second argument to startsWith() must match the release-branch-prefix
    # input to this Action. Here, we use the default, "automation_release-".
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # This is to guarantee that the most recent tag is fetched,
          # which we need for updating the shorthand major version tag.
          fetch-depth: 0
          # We check out the release pull request's base branch, which will be
          # used as the base branch for all git operations.
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Get token
        id: get-token
        uses: MetaMask/github-tools/.github/actions/get-token@v1
        with:
          token-exchange-url: ${{ vars.TOKEN_EXCHANGE_URL }}
          permissions: |
            contents: write

      - uses: MetaMask/action-publish-release@v3
        id: publish-release
        env:
          GITHUB_TOKEN: ${{ steps.get-token.outputs.token }}

      - name: Update shorthand major version tag
        uses: MetaMask/github-tools/.github/actions/update-major-version-tag@v1
        with:
          release-version: ${{ steps.publish-release.outputs.release-version }}
          github-token: ${{ steps.get-token.outputs.token }}
